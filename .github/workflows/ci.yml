name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit & snapshot tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @netrock/core test

  dotnet-matrix:
    name: "Build & test: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-only
            features: core
          - name: minimal (core + auth)
            features: core,auth
          - name: core + auth + email stack
            features: core,auth,email,email-verification,password-reset
          - name: core + auth + 2fa
            features: core,auth,2fa
          - name: core + auth + oauth
            features: core,auth,oauth
          - name: core + auth + jobs
            features: core,auth,jobs
          - name: core + auth + audit + admin
            features: core,auth,audit,admin
          - name: core + auth + file-storage + avatars
            features: core,auth,file-storage,avatars
          - name: core + audit
            features: core,audit
          - name: core + auth + captcha
            features: core,auth,captcha
          - name: api-only (full backend)
            features: core,auth,email,email-verification,password-reset,2fa,oauth,captcha,jobs,file-storage,avatars,audit,admin,aspire
          - name: full (all features)
            features: core,auth,email,email-verification,password-reset,2fa,oauth,captcha,jobs,file-storage,avatars,audit,admin,aspire,frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - run: pnpm install --frozen-lockfile

      - name: Generate project
        run: |
          node --loader ts-node/esm scripts/generate-ci.ts \
            --name ci-test \
            --features "${{ matrix.features }}" \
            --output /tmp/ci-output

      - name: dotnet build
        run: dotnet build /tmp/ci-output/src/backend/CiTest.slnx --nologo

      - name: dotnet test
        run: dotnet test /tmp/ci-output/src/backend/CiTest.slnx -c Release --nologo
