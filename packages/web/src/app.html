<!doctype html>
<html lang="en" style="background: #08080d; color: #ececf1">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Generate .NET 10 API projects with auth, email, jobs, file storage, and more. Pick features, download a complete solution that builds and tests pass."
		/>
		<meta name="theme-color" content="#08080d" />
		<meta
			name="keywords"
			content=".NET, .NET 10, API generator, Clean Architecture, project generator, SvelteKit, PostgreSQL, Aspire, C#, dotnet"
		/>
		<link rel="canonical" href="https://netrock.dev/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="netrock" />
		<meta property="og:url" content="https://netrock.dev/" />
		<meta property="og:title" content="netrock - .NET API project generator" />
		<meta
			property="og:description"
			content="Generate .NET 10 API projects with auth, email, jobs, file storage, and more. Pick features, download a complete solution that builds and tests pass."
		/>

		<meta property="og:image" content="https://netrock.dev/og-preview.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://netrock.dev/og-preview.png" />
		<meta name="twitter:title" content="netrock - .NET API project generator" />
		<meta
			name="twitter:description"
			content="Your next .NET project starts here. 15 features, 960 valid combinations, zero boilerplate."
		/>

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "netrock",
				"url": "https://netrock.dev",
				"description": "Generate .NET 10 API projects with auth, email, jobs, file storage, and more. Pick features, download a complete solution.",
				"applicationCategory": "DeveloperApplication",
				"operatingSystem": "Any",
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "USD"
				},
				"author": {
					"@type": "Person",
					"name": "Filip Pindej",
					"url": "https://github.com/fpindej"
				}
			}
		</script>

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
