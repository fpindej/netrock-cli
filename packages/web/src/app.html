<!doctype html>
<html lang="en" style="background: #08080d; color: #ececf1">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Generate .NET API projects with the features you need. Pick, preview, download a ready-to-run repository."
		/>
		<meta name="theme-color" content="#08080d" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="netrock - .NET API project generator" />
		<meta
			property="og:description"
			content="Generate .NET API projects with the features you need. Pick, preview, download a ready-to-run repository."
		/>

		<!-- Twitter -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="netrock - .NET API project generator" />
		<meta
			name="twitter:description"
			content="Generate .NET API projects in seconds. Pick features, preview, download."
		/>

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>

		<!-- Favicon -->
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
